// ── Google Sheets Integration ─────────────────────────────────
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxrLbFFZksd9sTEtCRIL82mqvGStrchhj5aCe1TABv8X_4pUQVRxlwbOu6_mnyV8wK4SA/exec";

async function postToSheets(entry, startLabel, endLabel) {
  const payload = {
    submittedAt: entry.submittedAt,
    timezone: entry.timezone,
    teamMember: entry.teamMember,
    date: entry.date,
    startTime: entry.isPTO ? "N/A" : startLabel,
    endTime: entry.isPTO ? "N/A" : endLabel,
    durationMin: String(entry.endMin - entry.startMin),
    ptoHours: entry.ptoHours || "",
    entryType: entry.entryType,
    category: entry.category,
    taskType: entry.taskType || "",
    notes: entry.notes,
  };
  console.log("Posting to Sheets:", payload);
  try {
    const res = await fetch(SHEETS_URL, {
      method: "POST",
      mode: "no-cors",
      body: new URLSearchParams(payload),
    });
    console.log("Sheets post response type:", res.type, res.status);
  } catch (err) {
    console.error("Sheets post failed:", err);
  }
}

// ── Time Helpers ──────────────────────────────────────────────
function generateTimeSlots() {
  const slots = [];
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 15) {
      const hh = h % 12 === 0 ? 12 : h % 12;
      const mm = m.toString().padStart(2, "0");
      const ampm = h < 12 ? "AM" : "PM";
      const label = `${hh}:${mm} ${ampm}`;
      const minutes = h * 60 + m;
      slots.push({ label, minutes });
    }
  }
  return slots;
}
const TIME_SLOTS = generateTimeSlots();

// Returns slots within a 3-hour lookback window up to current time
// If selected date is today, filter. If past date, show all.
function getStartSlots(selectedDate) {
  const today = new Date().toISOString().slice(0, 10);
  if (selectedDate !== today) return TIME_SLOTS;
  const now = new Date();
  const currentMinutes = now.getHours() * 60 + now.getMinutes();
  const lookbackMinutes = currentMinutes - (3 * 60);
  return TIME_SLOTS.filter(s => s.minutes >= Math.max(0, lookbackMinutes) && s.minutes <= currentMinutes);
}

function minutesToLabel(min) {
  const slot = TIME_SLOTS.find(s => s.minutes === min);
  return slot ? slot.label : "";
}

function getEndSlots(startMinutes) {
  return TIME_SLOTS.filter(s => {
    const diff = s.minutes - startMinutes;
    return diff > 0 && diff <= 60;
  });
}

function formatDuration(startMin, endMin) {
  const diff = endMin - startMin;
  if (diff <= 0) return "";
  if (diff < 60) return `${diff} min`;
  return "1 hr";
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

// Formats a YYYY-MM-DD date string without UTC timezone shift
function formatDateStr(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

// Full weekday + date label for grouping headers
function formatDateStrLong(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
}

function formatTime(iso, tz) {
  const d = new Date(iso);
  const opts = { hour: "numeric", minute: "2-digit" };
  if (tz) {
    try {
      return d.toLocaleTimeString("en-US", { ...opts, timeZone: tz, timeZoneName: "short" });
    } catch {
      // fallback if tz string is invalid
    }
  }
  return d.toLocaleTimeString("en-US", opts);
}

// ── LocalStorage Helpers ──────────────────────────────────────
function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ── CSV Export ────────────────────────────────────────────────
function buildCSV(entries) {
  const headers = ["Submitted At","Timezone","Team Member","Date","Start Time","End Time","Duration (min)","PTO Hours","Entry Type","Client / Category","Task Type","Notes"];
  const rows = entries.map(e => [
    e.submittedAt, e.timezone || "Unknown", e.teamMember,
    formatDateStr(e.date),
    e.isPTO ? "N/A" : minutesToLabel(e.startMin),
    e.isPTO ? "N/A" : minutesToLabel(e.endMin),
    e.isPTO ? Math.round(parseFloat(e.ptoHours) * 60) : (e.endMin - e.startMin),
    e.isPTO ? e.ptoHours : "",
    e.entryType, e.category, e.taskType || "", `"${(e.notes||"").replace(/"/g,'""')}"`
  ]);
  return [headers, ...rows].map(r => r.join(",")).join("\n");
}

// ── Inline "Add Custom" Dropdown ──────────────────────────────
function CustomSelect({ options, value, onChange, placeholder, storageKey }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newVal, setNewVal] = useState("");
  const [allOptions, setAllOptions] = useState(() => {
    const custom = lsGet(`custom_${storageKey}`, []);
    return [...options, ...custom];
  });

  const handleAdd = () => {
    const trimmed = newVal.trim();
    if (!trimmed || allOptions.includes(trimmed)) { setShowAdd(false); setNewVal(""); return; }
    const custom = lsGet(`custom_${storageKey}`, []);
    const updated = [...custom, trimmed];
    lsSet(`custom_${storageKey}`, updated);
    const next = [...options, ...updated];
    setAllOptions(next);
    onChange(trimmed);
    setShowAdd(false);
    setNewVal("");
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      <select
        value={value}
        onChange={e => { if (e.target.value === "__add__") setShowAdd(true); else onChange(e.target.value); }}
        style={styles.select}
      >
        <option value="">{placeholder}</option>
        {allOptions.map(o => <option key={o} value={o}>{o}</option>)}
        <option value="__add__">＋ Add new…</option>
      </select>
      {showAdd && (
        <div style={{ display: "flex", gap: 6 }}>
          <input
            autoFocus
            value={newVal}
            onChange={e => setNewVal(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") handleAdd(); if (e.key === "Escape") setShowAdd(false); }}
            placeholder="Type new option…"
            style={{ ...styles.input, flex: 1 }}
          />
          <button onClick={handleAdd} style={styles.btnSmallPrimary}>Add</button>
          <button onClick={() => { setShowAdd(false); setNewVal(""); }} style={styles.btnSmallGhost}>✕</button>
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
export default function App() {
  const [screen, setScreen] = useState("splash"); // splash | main | history
  const [teamMember, setTeamMember] = useState(() => lsGet("mr_team_member", ""));
  const [entries, setEntries] = useState(() => lsGet("mr_entries", []));
  const [form, setForm] = useState({ entryType: "client", category: "", taskType: "", startMin: "", endMin: "", notes: "", date: new Date().toISOString().slice(0,10) });
  const [errors, setErrors] = useState({});
  const [banner, setBanner] = useState(false);
  const [saved, setSaved] = useState(false);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [csvModal, setCsvModal] = useState(false);
  const lastReminderRef = useRef(Date.now());
  const bannerTimerRef = useRef(null);

  // Hourly reminder
  useEffect(() => {
    const interval = setInterval(() => {
      const now = Date.now();
      if (now - lastReminderRef.current >= 60 * 60 * 1000) {
        setBanner(true);
        lastReminderRef.current = now;
      }
    }, 30000);
    return () => clearInterval(interval);
  }, []);

  // Auto-hide banner after 30s
  useEffect(() => {
    if (banner) {
      bannerTimerRef.current = setTimeout(() => setBanner(false), 30000);
      return () => clearTimeout(bannerTimerRef.current);
    }
  }, [banner]);

  // Persist entries
  useEffect(() => { lsSet("mr_entries", entries); }, [entries]);

  const handleNameSelect = (name) => {
    lsSet("mr_team_member", name);
    setTeamMember(name);
    setScreen("main");
  };

  const isPTO = form.entryType === "personal" && form.category === "PTO / Sick";

  const validate = () => {
    const e = {};
    if (!form.date) e.date = "Required";
    if (isPTO) {
      if (!form.ptoHours) e.ptoHours = "Required";
    } else {
      if (form.startMin === "") e.startMin = "Required";
      if (form.endMin === "") e.endMin = "Required";
    }
    if (!form.category) e.category = "Required";
    if (form.entryType === "client" && !form.taskType) e.taskType = "Required";
    if (!form.notes || form.notes.trim().length < 3) e.notes = "Please add a brief description";
    return e;
  };

  const handleSubmit = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    const startMin = isPTO ? 0 : form.startMin;
    const endMin   = isPTO ? Math.round(parseFloat(form.ptoHours) * 60) : form.endMin;
    const entry = {
      id: Date.now().toString(),
      submittedAt: new Date().toISOString(),
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      teamMember,
      date: form.date,
      startMin,
      endMin,
      isPTO: isPTO || false,
      ptoHours: isPTO ? form.ptoHours : null,
      entryType: form.entryType,
      category: form.category,
      taskType: form.taskType,
      notes: form.notes,
    };
    setEntries(prev => [entry, ...prev]);
    // Post to Google Sheets in background — failure is silent, localStorage is the backup
    postToSheets(
      entry,
      minutesToLabel(entry.startMin),
      minutesToLabel(entry.endMin)
    );
    setForm({ entryType: "client", category: "", taskType: "", startMin: "", endMin: "", ptoHours: "", notes: "", date: new Date().toISOString().slice(0,10) });
    setErrors({});
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  const handleDelete = (id) => {
    setEntries(prev => prev.filter(e => e.id !== id));
    setDeleteConfirm(null);
  };

  const startSlots = getStartSlots(form.date);
  const endSlots = form.startMin !== "" ? getEndSlots(form.startMin) : [];
  const todayEntries = entries.filter(e => e.date === new Date().toISOString().slice(0,10));
  const totalTodayMin = todayEntries.reduce((sum, e) => sum + (e.endMin - e.startMin), 0);

  // ── SPLASH ────────────────────────────────────────────────
  if (screen === "splash") {
    return (
      <div style={styles.splashWrap}>
        <div style={styles.splashCard}>
          <div style={styles.logoRow}>
            <RhinoIcon size={48} />
            <div>
              <div style={styles.logoTitle}>MegaRhino</div>
              <div style={styles.logoSub}>Time Tracker</div>
            </div>
          </div>
          <p style={styles.splashHint}>Who are you? Select your name to begin.</p>
          <div style={styles.nameGrid}>
            {DEFAULT_TEAM.map(name => (
              <button key={name} onClick={() => handleNameSelect(name)} style={styles.nameBtn}>
                <span style={styles.nameInitial}>{name.charAt(0)}</span>
                <span style={styles.nameFull}>{name}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── HISTORY ───────────────────────────────────────────────
  if (screen === "history") {
    // Group entries by date, sorted newest first
    const grouped = entries.reduce((acc, e) => {
      if (!acc[e.date]) acc[e.date] = [];
      acc[e.date].push(e);
      return acc;
    }, {});
    const sortedDates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
    const today = new Date().toISOString().slice(0, 10);

    return (
      <div style={styles.appWrap}>
        <Header teamMember={teamMember} onExport={() => setCsvModal(true)} entryCount={entries.length} />
        {banner && <Banner onDismiss={() => setBanner(false)} />}
        <div style={styles.content}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
            <div>
              <h2 style={styles.sectionTitle}>My Entries</h2>
              <p style={styles.sectionSub}>{entries.length} total · {sortedDates.length} day{sortedDates.length !== 1 ? "s" : ""}</p>
            </div>
            <button onClick={() => setScreen("main")} style={styles.btnGhost}>← Log Time</button>
          </div>
          {entries.length === 0 ? (
            <div style={styles.emptyState}>No entries yet. Start logging your time!</div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:24 }}>
              {sortedDates.map(date => {
                const dayEntries = grouped[date];
                const dayMinutes = dayEntries.reduce((sum, e) => sum + (e.endMin - e.startMin), 0);
                const isToday = date === today;
                return (
                  <div key={date}>
                    {/* Day header */}
                    <div style={styles.dayHeader}>
                      <div style={styles.dayHeaderLeft}>
                        <span style={styles.dayLabel}>
                          {isToday ? "Today — " : ""}{formatDateStrLong(date)}
                        </span>
                      </div>
                      <div style={styles.dayStats}>
                        <span style={styles.dayStat}>{dayEntries.length} entr{dayEntries.length !== 1 ? "ies" : "y"}</span>
                        <span style={styles.dayStatDivider}>·</span>
                        <span style={styles.dayStat}>{Math.floor(dayMinutes/60)}h {dayMinutes%60}m logged</span>
                      </div>
                    </div>
                    {/* Entries for this day */}
                    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                      {dayEntries.map(e => (
                        <EntryCard key={e.id} entry={e} onDelete={() => setDeleteConfirm(e.id)} />
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        {deleteConfirm && (
          <Modal onClose={() => setDeleteConfirm(null)}>
            <p style={{ color: BRAND.white, marginBottom:16 }}>Delete this entry?</p>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={() => handleDelete(deleteConfirm)} style={styles.btnDanger}>Delete</button>
              <button onClick={() => setDeleteConfirm(null)} style={styles.btnGhost}>Cancel</button>
            </div>
          </Modal>
        )}
        {csvModal && <CSVModal csv={buildCSV(entries)} onClose={() => setCsvModal(false)} />}
      </div>
    );
  }

  // ── MAIN ENTRY FORM ───────────────────────────────────────
  return (
    <div style={styles.appWrap}>
      <Header teamMember={teamMember} onExport={() => setCsvModal(true)} entryCount={entries.length} />
      {banner && <Banner onDismiss={() => setBanner(false)} />}
      <div style={styles.content}>
        {/* Today's summary strip */}
        <div style={styles.summaryStrip}>
          <div style={styles.summaryItem}>
            <span style={styles.summaryNum}>{todayEntries.length}</span>
            <span style={styles.summaryLabel}>entries today</span>
          </div>
          <div style={styles.summaryDivider} />
          <div style={styles.summaryItem}>
            <span style={styles.summaryNum}>{Math.floor(totalTodayMin/60)}h {totalTodayMin%60}m</span>
            <span style={styles.summaryLabel}>logged today</span>
          </div>
          <div style={styles.summaryDivider} />
          <button onClick={() => setScreen("history")} style={styles.summaryLink}>
            View all entries →
          </button>
        </div>

        {/* Form Card */}
        <div style={styles.formCard}>
          <h2 style={styles.formTitle}>Log Time Entry</h2>

          {/* Date */}
          <div style={styles.fieldGroup}>
            <label style={styles.label}>Date</label>
            <input
              type="date"
              value={form.date}
              onChange={e => setForm(f => ({ ...f, date: e.target.value }))}
              style={{ ...styles.input, ...(errors.date ? styles.inputError : {}) }}
            />
            {errors.date && <span style={styles.errorMsg}>{errors.date}</span>}
          </div>

          {/* Start / End Time — hidden for PTO */}
          {!isPTO && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
              <div style={styles.fieldGroup}>
                <label style={styles.label}>Start Time</label>
                <select
                  value={form.startMin}
                  onChange={e => setForm(f => ({ ...f, startMin: Number(e.target.value), endMin: "" }))}
                  style={{ ...styles.select, ...(errors.startMin ? styles.inputError : {}) }}
                >
                  <option value="">Select…</option>
                  {startSlots.map(s => <option key={s.minutes} value={s.minutes}>{s.label}</option>)}
                </select>
                {errors.startMin && <span style={styles.errorMsg}>{errors.startMin}</span>}
              </div>
              <div style={styles.fieldGroup}>
                <label style={styles.label}>
                  End Time
                  {form.startMin !== "" && form.endMin !== "" && (
                    <span style={styles.durationPill}>{formatDuration(form.startMin, form.endMin)}</span>
                  )}
                </label>
                <select
                  value={form.endMin}
                  onChange={e => setForm(f => ({ ...f, endMin: Number(e.target.value) }))}
                  disabled={form.startMin === ""}
                  style={{ ...styles.select, ...(errors.endMin ? styles.inputError : {}), opacity: form.startMin === "" ? 0.5 : 1 }}
                >
                  <option value="">Select…</option>
                  {endSlots.map(s => <option key={s.minutes} value={s.minutes}>{s.label}</option>)}
                </select>
                {errors.endMin && <span style={styles.errorMsg}>{errors.endMin}</span>}
              </div>
            </div>
          )}

          {/* PTO Hours selector — shown only for PTO / Sick */}
          {isPTO && (
            <div style={styles.fieldGroup}>
              <label style={styles.label}>Total Hours</label>
              <div style={styles.ptoHint}>Select the total hours of PTO or sick time for this date.</div>
              <select
                value={form.ptoHours}
                onChange={e => setForm(f => ({ ...f, ptoHours: e.target.value }))}
                style={{ ...styles.select, ...(errors.ptoHours ? styles.inputError : {}) }}
              >
                <option value="">Select hours…</option>
                {[0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8].map(h => (
                  <option key={h} value={h}>{h === 0.5 ? "30 min" : `${h} hr${h !== 1 ? "s" : ""}`}</option>
                ))}
              </select>
              {errors.ptoHours && <span style={styles.errorMsg}>{errors.ptoHours}</span>}
            </div>
          )}

          {/* Entry Type Toggle */}
          <div style={styles.fieldGroup}>
            <label style={styles.label}>Entry Type</label>
            <div style={styles.toggleRow}>
              <button
                onClick={() => setForm(f => ({ ...f, entryType:"client", category:"", taskType:"" }))}
                style={{ ...styles.toggleBtn, ...(form.entryType === "client" ? styles.toggleActive : styles.toggleInactive) }}
              >Client Work</button>
              <button
                onClick={() => setForm(f => ({ ...f, entryType:"personal", category:"", taskType:"" }))}
                style={{ ...styles.toggleBtn, ...(form.entryType === "personal" ? styles.toggleActive : styles.toggleInactive) }}
              >Personal Time</button>
            </div>
          </div>

          {/* Category */}
          <div style={styles.fieldGroup}>
            <label style={styles.label}>{form.entryType === "client" ? "Client" : "Personal Time Category"}</label>
            <CustomSelect
              key={form.entryType}
              options={form.entryType === "client" ? DEFAULT_CLIENTS : DEFAULT_PERSONAL}
              value={form.category}
              onChange={v => setForm(f => ({ ...f, category: v }))}
              placeholder={form.entryType === "client" ? "Select client…" : "Select category…"}
              storageKey={form.entryType === "client" ? "clients" : "personal"}
            />
            {errors.category && <span style={styles.errorMsg}>{errors.category}</span>}
          </div>

          {/* Task Type (client only) */}
          {form.entryType === "client" && (
            <div style={styles.fieldGroup}>
              <label style={styles.label}>Task Type</label>
              <CustomSelect
                options={DEFAULT_TASKS}
                value={form.taskType}
                onChange={v => setForm(f => ({ ...f, taskType: v }))}
                placeholder="Select task…"
                storageKey="tasks"
              />
              {errors.taskType && <span style={styles.errorMsg}>{errors.taskType}</span>}
            </div>
          )}

          {/* Notes — Required */}
          <div style={styles.fieldGroup}>
            <label style={styles.label}>
              Notes <span style={styles.notesRequired}>(Required)</span>
            </label>
            <div style={styles.notesHint}>Brief description — e.g. "optimized WH listings" or "PPC audit for ZP"</div>
            <textarea
              value={form.notes}
              onChange={e => setForm(f => ({ ...f, notes: e.target.value }))}
              placeholder="What were you working on?"
              rows={2}
              style={{ ...styles.textarea, ...(errors.notes ? styles.inputError : {}) }}
            />
            {errors.notes && <span style={styles.errorMsg}>{errors.notes}</span>}
          </div>

          {/* Submit */}
          <button onClick={handleSubmit} style={styles.btnPrimary}>
            {saved ? "✓ Entry Saved!" : "Save Entry"}
          </button>
          {saved && <div style={styles.savedBanner}>✓ Entry saved locally and posted to Google Sheets.</div>}
        </div>

        {/* Recent entries preview */}
        {todayEntries.length > 0 && (
          <div style={{ marginTop: 24 }}>
            <h3 style={{ ...styles.sectionTitle, marginBottom: 12 }}>Today's Entries</h3>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {todayEntries.slice(0,3).map(e => (
                <EntryCard key={e.id} entry={e} compact onDelete={() => setDeleteConfirm(e.id)} />
              ))}
              {todayEntries.length > 3 && (
                <button onClick={() => setScreen("history")} style={styles.viewMoreBtn}>
                  View all {todayEntries.length} entries today →
                </button>
              )}
            </div>
          </div>
        )}
      </div>

      {deleteConfirm && (
        <Modal onClose={() => setDeleteConfirm(null)}>
          <p style={{ color: BRAND.white, marginBottom:16 }}>Delete this entry?</p>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={() => handleDelete(deleteConfirm)} style={styles.btnDanger}>Delete</button>
            <button onClick={() => setDeleteConfirm(null)} style={styles.btnGhost}>Cancel</button>
          </div>
        </Modal>
      )}
      {csvModal && <CSVModal csv={buildCSV(entries)} onClose={() => setCsvModal(false)} />}
    </div>
  );
}

}

function Banner({ onDismiss }) {
  return (
    <div style={styles.reminderBanner}>
      <span style={styles.bannerIcon}>⏰</span>
      <span style={styles.bannerText}>
        <strong>Time to log!</strong> It's been about an hour — take a moment to record what you've been working on.
      </span>
      <button onClick={onDismiss} style={styles.bannerDismiss}>Dismiss</button>
    </div>
  );
}

function EntryCard({ entry, compact, onDelete }) {
  const duration = entry.endMin - entry.startMin;
  const isPTO = entry.isPTO;
  const timeDisplay = isPTO
    ? `PTO / Sick — ${entry.ptoHours} hr${entry.ptoHours != 1 ? "s" : ""}`
    : `${minutesToLabel(entry.startMin)} – ${minutesToLabel(entry.endMin)}`;
  const durationDisplay = isPTO
    ? `${Math.round(duration / 60 * 10) / 10} hrs`
    : `${duration} min`;

  return (
    <div style={{ ...styles.entryCard, ...(compact ? styles.entryCardCompact : {}) }}>
      <div style={styles.entryCardLeft}>
        <div style={styles.entryTimeRange}>
          {timeDisplay}
          <span style={styles.entryDurationBadge}>{durationDisplay}</span>
        </div>
        <div style={styles.entryMeta}>
          <span style={{ ...styles.entryTypeBadge, background: entry.entryType === "client" ? BRAND.navyLight : "#3a2f5e" }}>
            {entry.entryType === "client" ? "Client" : "Personal"}
          </span>
          <span style={styles.entryCat}>{entry.category}</span>
          {entry.taskType && <span style={styles.entryTask}>· {entry.taskType}</span>}
        </div>
        {entry.notes && !compact && <div style={styles.entryNotes}>{entry.notes}</div>}
        {entry.notes && compact && <div style={styles.entryNotes}>{entry.notes}</div>}
        <div style={styles.entrySubmitted}>
          Submitted {formatTime(entry.submittedAt, entry.timezone)}
          {entry.timezone && <span style={styles.tzBadge}>{entry.timezone}</span>}
        </div>
      </div>
      <button onClick={onDelete} style={styles.entryDelete} title="Delete">✕</button>
    </div>
  );
}

function Modal({ children, onClose }) {
  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalCard} onClick={e => e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
}

function CSVModal({ csv, onClose }) {
  const [copied, setCopied] = useState(false);

  const handleCopy = () => {
    navigator.clipboard.writeText(csv).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    }).catch(() => {
      // fallback: select the textarea
      const ta = document.getElementById("csv-textarea");
      if (ta) { ta.select(); document.execCommand("copy"); setCopied(true); setTimeout(() => setCopied(false), 2500); }
    });
  };

  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={{ ...styles.modalCard, maxWidth: 580, width: "90%", maxHeight: "80vh", display: "flex", flexDirection: "column" }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
          <div>
            <div style={{ color: BRAND.white, fontWeight: 700, fontSize: 15, fontFamily: "'Georgia', serif" }}>Export CSV Data</div>
            <div style={{ color: BRAND.gray, fontSize: 12, marginTop: 2 }}>Copy the text below and paste into a .csv file or Google Sheet</div>
          </div>
          <button onClick={onClose} style={{ background: "transparent", border: "none", color: BRAND.gray, fontSize: 18, cursor: "pointer" }}>✕</button>
        </div>
        <textarea
          id="csv-textarea"
          readOnly
          value={csv}
          style={{
            flex: 1, minHeight: 280, background: BRAND.navy, color: BRAND.offWhite,
            border: `1px solid ${BRAND.navyLight}`, borderRadius: 8, padding: 12,
            fontSize: 11, fontFamily: "monospace", resize: "none", outline: "none",
            lineHeight: 1.5,
          }}
        />
        <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
          <button onClick={handleCopy} style={{ ...styles.btnPrimary, flex: 1, padding: "11px 0" }}>
            {copied ? "✓ Copied to clipboard!" : "Copy to Clipboard"}
          </button>
          <button onClick={onClose} style={styles.btnGhost}>Close</button>
        </div>
      </div>
    </div>
  );
}
